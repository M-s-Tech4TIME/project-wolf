[alembic]
# %(here)s resolves to the directory containing this alembic.ini.
# Keeps migrations findable regardless of CWD (was a bug from
# Phase 5.5 rename — broke CI silently because the workflow runs
# from repo root, not services/server/).
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
version_path_separator = os

# DATABASE_URL is injected from environment; do not hardcode here.
# The env.py reads it from the app settings.
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
