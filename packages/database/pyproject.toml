[project]
name = "wolf-database"
version = "0.1.0"
description = "Wolf's bundled-Postgres component — wraps system Postgres 17 + pgvector with Wolf-owned config + data dir (Phase 5.7)"
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
test = [
    "pytest>=9.1.1",
]

# Phase 5.7-b: the CLI is shipped as a console script so an operator
# can run `wolf-database init` directly after a workspace `uv sync`.
# Mirrors wolf-cert's invocation shape. `python -m wolf_database` is
# the equivalent module-level invocation.
[project.scripts]
wolf-database = "wolf_database.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wolf_database"]
# PEP 561: ship `py.typed` so downstream services see type information.
include = ["wolf_database/py.typed"]
