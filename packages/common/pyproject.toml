[project]
name = "wolf-common"
version = "0.1.0"
description = "Shared logging, tracing, and error taxonomy for Wolf services"
requires-python = ">=3.13"
dependencies = [
    "structlog>=24.0",
    "opentelemetry-api>=1.43.0",
    "opentelemetry-sdk>=1.26",
    "opentelemetry-exporter-otlp-proto-grpc>=1.26",
    "opentelemetry-instrumentation-fastapi>=0.47b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.47b0",
    "opentelemetry-instrumentation-httpx>=0.47b0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wolf_common"]
# PEP 561: ship `py.typed` so downstream services see type information.
# Without this, mypy treats the whole package as untyped and silently
# drops every import — the Phase-0 blind spot fixed 2026-06-01.
include = ["wolf_common/py.typed"]
