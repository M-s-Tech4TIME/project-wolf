[project]
name = "wolf-secrets"
version = "0.1.0"
description = "Secrets-backend abstraction for Wolf (encrypted-file and OpenBao adapters)"
requires-python = ">=3.13"
dependencies = [
    "cryptography>=42.0",
    "wolf-common",
]

[tool.uv.sources]
wolf-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["wolf_secrets"]
# PEP 561: ship `py.typed` so downstream services see type information.
# Without this, mypy treats the whole package as untyped and silently
# drops every import — the Phase-0 blind spot fixed 2026-06-01.
include = ["wolf_secrets/py.typed"]
