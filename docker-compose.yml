services:

  # ─── Data layer ─────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    container_name: wolf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wolf
      POSTGRES_PASSWORD: wolf_dev_password
      POSTGRES_DB: wolf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wolf -d wolf"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Services ───────────────────────────────────────────────────────────────

  orchestrator:
    build:
      context: .
      dockerfile: deploy/docker/orchestrator.Dockerfile
    container_name: wolf-orchestrator
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://wolf:wolf_dev_password@postgres:5432/wolf
      SECRET_KEY: dev-only-change-in-production-32chars!!
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      OTEL_EXPORTER_OTLP_ENDPOINT: ""  # empty = no export in dev
      SECRETS_BACKEND: file
      SECRETS_FILE_PATH: /run/secrets/wolf_secrets.enc
      SECRETS_FILE_KEY: dev-only-fernet-key-change-in-prod=
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  gateway:
    build:
      context: .
      dockerfile: deploy/docker/gateway.Dockerfile
    container_name: wolf-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://wolf:wolf_dev_password@postgres:5432/wolf
      SECRET_KEY: dev-only-change-in-production-32chars!!
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
