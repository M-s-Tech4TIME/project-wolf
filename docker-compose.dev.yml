# Dev overlay: hot reload, verbose logging, exposed ports
services:

  server:
    environment:
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    command: uvicorn wolf_server.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./services/server:/app
      - ./packages:/packages

  gateway:
    environment:
      LOG_LEVEL: DEBUG
      ENVIRONMENT: development
    command: uvicorn wolf_gateway.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./services/gateway:/app
      - ./packages:/packages
