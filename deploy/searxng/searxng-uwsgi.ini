# SearXNG uWSGI config — official Debian/Ubuntu content per
# docs.searxng.org/admin/installation-uwsgi.html. Managed by Wolf as the
# wolf-search component (ADR 0032): the ONLY deviation from the official
# file is the socket — Wolf's single caller (wolf-server) speaks loopback
# HTTP, so the unix socket + reverse-proxy pair is replaced by uWSGI's own
# http-socket on the operator-chosen port 1307. NOT symlinked into
# apps-enabled: the dedicated wolf-search.service runs this ini.

[uwsgi]
# Who will run the code
uid = searxng
gid = searxng

# Number of workers (usually CPU count)
workers = %k
threads = 4

# Plugin to use and interpreter config
single-interpreter = true
master = true
plugin = python3,http
lazy-apps = true
enable-threads = 4

# Module to import
module = searx.webapp

# Virtualenv and python path
virtualenv = /usr/local/searxng/searx-pyenv
pythonpath = /usr/local/searxng/searxng-src/

# encoding
env = LANG=C.UTF-8
env = LANGUAGE=C.UTF-8
env = LC_ALL=C.UTF-8

# settings path
env = SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml

# Wolf delta (ADR 0032 A3.1): serve loopback HTTP directly — no nginx.
# Official default is `socket = /usr/local/searxng/run/socket` + a reverse proxy.
http-socket = 127.0.0.1:1307
buffer-size = 8192
