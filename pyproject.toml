[tool.uv.workspace]
members = ["packages/*", "services/server", "services/gateway"]
# `packages/*` already covers `packages/database` (the wolf-database
# component, Phase 5.7-a) via the glob; new packages drop in here
# without an explicit add.

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "UP",       # pyupgrade
    "S",        # flake8-bandit (security)
    "B",        # flake8-bugbear
    "A",        # flake8-builtins
    "C4",       # flake8-comprehensions
    "DTZ",      # flake8-datetimez (tz-aware datetime)
    "T20",      # flake8-print
    "RET",      # flake8-return
    "SIM",      # flake8-simplify
    "TCH",      # flake8-type-checking
    "PTH",      # flake8-use-pathlib
]
ignore = [
    "S101",  # assert used in tests
    "B008",  # function call in default argument (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
# Match tests at any depth (services/<svc>/tests/**, packages/<pkg>/tests/**,
# top-level tests/**, ...). The prior `tests/**` glob only matched
# top-level paths, so nested test suites silently inherited the
# stricter ruleset.
"**/tests/**" = ["S", "T20", "TC003"]
"**/migrations/**" = ["N999"]
# CLI / launcher modules — `print` is the whole point. T20
# (flake8-print) is the correct rule for application code but
# doesn't apply here.
"packages/cert/wolf_cert/cli.py" = ["T20"]
"packages/cert/wolf_cert/__main__.py" = ["T20"]
"services/server/wolf_server/__main__.py" = ["T20"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
# warn_unused_configs intentionally disabled: this is a uv workspace
# with multiple services that share one root mypy config, so an
# override entry can be "unused" by one subtree (e.g. wolf-gateway
# doesn't import pgvector) while being load-bearing for another
# (wolf-server does). Enabling this would emit noise on every subtree
# check that isn't actionable per-subtree. We keep the override list
# minimal and reviewed in code review instead.
warn_unused_configs = false
# Safety-critical packages must pass strict mypy
# Services and packages use per-module overrides if needed

# External libraries that do not ship PEP 561 type information. We treat
# them as `Any` at the import boundary; values flowing into Wolf code
# from these modules MUST be cast or validated at the call site so the
# `Any` stops at the boundary instead of propagating into the rest of
# wolf-server (`warn_return_any` catches any leaks).
#
# Keep this list minimal — every entry here is a typing blind spot.
# Drop modules as soon as the upstream library ships stubs OR we remove
# the dependency. If you add a new untyped third-party import, list it
# here with a comment naming the importing module.
[[tool.mypy.overrides]]
module = [
    "structlog.*",   # used across all services for logging
    "jose",          # python-jose, used in app.auth.local for JWT
    "pgvector.*",    # pgvector, used by app.knowledge.models
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Add repo root to sys.path so tools.model_probe.* is importable without
# being a workspace package (tools/ has __init__.py but no pyproject.toml).
pythonpath = ["."]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "ruff>=0.15.13",
]
