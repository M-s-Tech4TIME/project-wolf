[tool.uv.workspace]
members = ["packages/*", "services/orchestrator", "services/gateway"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "UP",       # pyupgrade
    "S",        # flake8-bandit (security)
    "B",        # flake8-bugbear
    "A",        # flake8-builtins
    "C4",       # flake8-comprehensions
    "DTZ",      # flake8-datetimez (tz-aware datetime)
    "T20",      # flake8-print
    "RET",      # flake8-return
    "SIM",      # flake8-simplify
    "TCH",      # flake8-type-checking
    "PTH",      # flake8-use-pathlib
]
ignore = [
    "S101",  # assert used in tests
    "B008",  # function call in default argument (FastAPI Depends)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "T20"]
"**/migrations/**" = ["N999"]

[tool.mypy]
python_version = "3.13"
strict = true
warn_return_any = true
warn_unused_configs = true
# Safety-critical packages must pass strict mypy
# Services and packages use per-module overrides if needed

[[tool.mypy.overrides]]
module = ["opensearchpy.*", "authlib.*", "structlog.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
# Add repo root to sys.path so tools.model_probe.* is importable without
# being a workspace package (tools/ has __init__.py but no pyproject.toml).
pythonpath = ["."]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "ruff>=0.15.13",
]
