name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node 20 was removed from GHA runners on 2026-09-16; JavaScript
# actions were forced to Node 24 on 2026-06-16. Every action this
# workflow uses now targets Node 24 natively: actions/checkout@v6,
# astral-sh/setup-uv@v7 (v7 is the first setup-uv major on node24 —
# v5/v6 are node20; bumped 2026-06-15 to clear the last deprecation
# annotation), actions/setup-python@v6, actions/setup-node@v6,
# actions/upload-artifact@v7, actions/download-artifact@v8.
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is retained as a belt-and-
# suspenders guard so any transitively-pinned node20 action also runs
# on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: Type-check (mypy strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run mypy on safety-critical packages
        # Phase 5.5 rename (2026-06-03): services/orchestrator/app
        # → services/server/wolf_server. wolf-cert library added to
        # the strict-typed set since it's Phase 5.4's substrate.
        # Phase 6.4 rename (2026-06-11): wolf_server/tenancy →
        # wolf_server/organization; wolf_server/models added so this
        # list matches the Makefile typecheck target exactly.
        # Phase 6.5-a: wolf_server/bootstrap added — it mints + rotates
        # the Superuser credential, so it belongs in the strict set.
        # Phase 6.5-b: wolf_server/api added — the RBAC capability gates
        # live on its routes (org CRUD, user management, consent gate).
        # Phase 6.5-g: wolf_server/auth added — session middleware, JWT
        # helpers, and the session blacklist live there.
        # Phase 6.5-h.2: wolf_server/network added — the same-network
        # verification gate's NIC-CIDR enumeration + membership check.
        # Phase 6 (ADR 0025): wolf_server/gateway added — the in-process
        # approval gateway (proposal state machine, approval, execution) is
        # the most safety-critical code in the project; wolf_server/tools
        # added so the propose tool + read tools are strict-typed too.
        # ADR 0026: wolf_server/grounding added — the LLM-as-judge honesty
        # validator (now with the deferred/incremental execution modes +
        # concurrent batched judging) is first-class safety-critical code,
        # not just transitively covered via agent/.
        # ADR 0032 (6-f.1): wolf_server/research added — the web-research
        # adapter layer (SearchProvider protocol + SearXNG backend +
        # resolver); it will feed model-visible tools, so it's strict-typed
        # from its first commit.
        run: |
          uv run mypy packages/common/wolf_common \
                       packages/secrets/wolf_secrets \
                       packages/schema/wolf_schema \
                       packages/cert/wolf_cert \
                       services/server/wolf_server/api \
                       services/server/wolf_server/auth \
                       services/server/wolf_server/organization \
                       services/server/wolf_server/audit \
                       services/server/wolf_server/bootstrap \
                       services/server/wolf_server/models \
                       services/server/wolf_server/network \
                       services/server/wolf_server/wazuh \
                       services/server/wolf_server/guardrails \
                       services/server/wolf_server/agent \
                       services/server/wolf_server/gateway \
                       services/server/wolf_server/grounding \
                       services/server/wolf_server/tools \
                       services/server/wolf_server/research \
                       --strict

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    # No Postgres service container — unit tests use SQLite
    # (conftest.py handles the dialect switch). Real-Postgres
    # behaviour is exercised by smoke-mtls / smoke-database /
    # smoke-systemd which are separate jobs.
    env:
      SECRET_KEY: test-secret-key-exactly-32-chars!!
      ENVIRONMENT: test
      SECRETS_BACKEND: file
      SECRETS_FILE_PATH: /tmp/wolf_test_secrets.enc
      # SECRETS_FILE_KEY intentionally NOT set here — the literal
      # "test-fernet-key-change-in-prod====" isn't a valid Fernet
      # key (Fernet wants 32 url-safe base64 bytes). conftest.py
      # provides a valid key via os.environ.setdefault, which only
      # fires when this env var is unset.
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        # --extra embeddings-local needed for test_factory_accepts_
        # sentence_transformers_aliases. Other extras stay opt-in.
        run: uv sync --all-packages --extra embeddings-local
      - name: Run tests with coverage
        # Coverage floor temporarily 70 (was 80). Current actual:
        # ~74.5%. The shortfall is in code paths not exercised by
        # unit tests (wazuh/resolver.py 47%, wazuh/server_api.py 84%,
        # etc.). Ratchet back to 80 as part of a dedicated
        # coverage-improvement slice — tracked alongside the
        # release-engineering work in docs/17.
        run: |
          uv run pytest services/server/tests packages/ \
            --cov=services/server/wolf_server \
            --cov=packages/common/wolf_common \
            --cov=packages/secrets/wolf_secrets \
            --cov=packages/schema/wolf_schema \
            --cov=packages/cert/wolf_cert \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v --tb=short
      # Cross-organization isolation is a load-bearing security property
      # (doc 05). The suite above already runs these via directory
      # discovery, but we name them explicitly here so the guard is
      # visible in the workflow and a regression (or accidental
      # test-file removal) is obvious in the CI log rather than silent.
      # Phase 4 Slice 4.4b; renamed in Phase 6.4 (tenant → organization).
      - name: Cross-organization isolation suite (explicit gate)
        run: |
          uv run pytest \
            services/server/tests/test_cross_organization_isolation.py \
            services/server/tests/test_organization_scoped_cache.py \
            -v --tb=short

  # Dependency-vulnerability gate — docs/17 Gap 10. Runs pip-audit
  # against the synced uv workspace to catch known CVEs in any
  # transitive Python dependency. Pairs with Dependabot's auto-PR
  # flow (config: .github/dependabot.yml) — Dependabot proposes
  # the fix, pip-audit blocks a merge that wouldn't actually
  # resolve the CVE.
  dep-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Sync the workspace
        # --all-packages installs every workspace package + their
        # transitive deps into .venv. pip-audit then sees the
        # complete dep graph that production .debs would ship.
        run: uv sync --all-packages
      - name: Install pip-audit into the workspace venv
        # `uv pip install` adds pip-audit to .venv WITHOUT
        # modifying pyproject.toml (no dev-dep pollution). Once
        # in the venv, `uv run pip-audit` runs it with the venv
        # active, so it sees every wolf-* + transitive dep.
        run: uv pip install pip-audit
      - name: Run pip-audit against the workspace venv
        # --desc: include CVE descriptions in the output so the
        # failure log is actionable without an extra lookup.
        #
        # NOT using --strict: that mode treats "Dependency not
        # found on PyPI" warnings as failures. Wolf's 7 workspace
        # packages (wolf-cert, wolf-common, wolf-database,
        # wolf-gateway, wolf-schema, wolf-secrets, wolf-server)
        # legitimately don't exist on PyPI — they're our internal
        # packages. Default behaviour already exits 1 on real
        # CVE findings, which is what we want.
        #
        # Retry loop (2026-06-11): pip-audit queries PyPI's
        # vulnerability API per-dependency; a transient PyPI-side
        # http error surfaces as pip_audit ServiceError and exit 1 —
        # indistinguishable from a finding by exit code alone (run
        # 27337124057 failed this way). Three attempts with a 30s
        # backoff ride out the flake; a REAL CVE finding fails all
        # three attempts identically, so nothing is masked — the
        # job still exits 1 on findings.
        run: |
          for attempt in 1 2 3; do
            if uv run pip-audit --desc; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "pip-audit attempt ${attempt} failed — retrying in 30s ..."
              sleep 30
            fi
          done
          echo "pip-audit failed on all 3 attempts."
          exit 1

  # Secrets-scanning gate — docs/17 Gap 11. Runs gitleaks against
  # the full git history on every push + PR. Allowlist for known
  # test-fixture strings lives at .gitleaks.toml. Default ruleset
  # covers AWS / GCP / GitHub PAT / SSH key / generic high-entropy
  # leak shapes.
  #
  # Uses the gitleaks CLI binary directly (MIT-licensed) rather
  # than gitleaks/gitleaks-action@v2 (which requires a paid
  # license for organization repos as of 2024+). The underlying
  # scanner is identical — only the GHA action wrapper has the
  # license clause.
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks can scan every commit, not
          # just the latest diff. Catches leaks that may have been
          # rebased/cherry-picked anywhere in branch history.
          fetch-depth: 0
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.21.2"
        run: |
          curl -sSLf \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks detect
        # `detect` scans the full git history (vs `protect` which
        # only scans uncommitted changes). --redact masks any
        # found secrets in the log so they aren't echoed.
        # --exit-code 1 ensures the job fails on findings.
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --exit-code 1

  # Frontend gate — TypeScript type-check + ESLint + production
  # build for services/dashboard. Mirrors what the Phase 5.9-d
  # smoke-deb job exercises implicitly (npm run build) but does
  # the explicit lint/type-check pass too. Catches dashboard
  # regressions that the .deb build wouldn't necessarily surface.
  # Phase 5.0c-l close-out gap caught by the 2026-06-05 CI audit.
  frontend:
    name: Frontend (tsc + eslint + build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          # Node 22+ required for Next.js 16 Turbopack production
          # builds (uses util.markAsUncloneable). Node 20 errors
          # with "TypeError: s.util.markAsUncloneable is not a
          # function" during page-data collection.
          node-version: "22"
          cache: npm
          cache-dependency-path: services/dashboard/package-lock.json
      - name: npm ci
        run: npm ci --no-audit --no-fund
      # npm-dependency vulnerability gate — the npm counterpart to the
      # Python `dep-audit` (pip-audit) job, which never sees npm deps. Fails
      # the build on moderate+ advisories anywhere in the dashboard's
      # dependency tree (the class hand-patched 2026-06-22: undici high/
      # moderate, hono high). Low-severity transitive noise is allowed so an
      # unrelated PR isn't blocked by an unfixable low finding. When a real
      # finding has no published fix yet, pin a floor or add an `overrides`
      # entry in services/dashboard/package.json (as done for hono), or raise
      # this threshold with a tracked TODO. Runs before tsc/build so a vuln
      # fails fast.
      - name: npm audit (dependency vulnerabilities)
        run: npm audit --audit-level=moderate
      - name: TypeScript type-check
        run: ./node_modules/.bin/tsc --noEmit
      - name: ESLint
        run: ./node_modules/.bin/eslint .
      - name: Production build (Next.js standalone)
        run: npm run build
      - name: Verify standalone build artifact exists
        run: test -f .next/standalone/server.js && echo "OK"

  # Catches model/migration drift: someone edits a SQLAlchemy model
  # but forgets to run `alembic revision --autogenerate`. Spins up
  # clean Postgres, applies all migrations, runs `alembic check`
  # which diffs the model metadata against the migrated schema.
  # Gap 13 from docs/17 — re-enabled 2026-06-05 after fixing three
  # root causes:
  #   1. env.py was missing knowledge.models import (so alembic
  #      didn't see knowledge_chunks in model metadata)
  #   2. Base needed a naming_convention (so model-generated
  #      constraint names match what migrations declared by hand)
  #   3. audit_events.event_data needed JSONB+with_variant(JSON,
  #      "sqlite") to match the migration's JSONB while keeping
  #      SQLite test compatibility
  alembic-check:
    name: Alembic migrations match models
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: wolf
          POSTGRES_PASSWORD: wolf_test
          POSTGRES_DB: wolf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wolf -d wolf_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://wolf:wolf_test@localhost:5432/wolf_test
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Apply all migrations
        run: uv run --package wolf-server alembic -c services/server/alembic.ini upgrade head
      - name: Verify models match migrations
        run: uv run --package wolf-server alembic -c services/server/alembic.ini check

  # Verify the model can never reach a write.
  #
  # Phase 6 (ADR 0025) reframe: execution moved INTO wolf-server (the in-process
  # approval gateway, decision A2), so the old "no execute_* string anywhere in
  # wolf-server" grep no longer fits — the write method legitimately lives on the
  # bounded WazuhServerApiActionClient and is invoked by wolf_server/gateway +
  # its API, post human-approval. The SURVIVING guarantee (doc 03 facts #1/#2):
  # the MODEL can never call a write. So the model-facing `tools/` package must
  # contain NO execute-tier tool and NO direct reference to the write client —
  # writes go through propose → human-approve → gateway, never a model tool.
  safety-check:
    name: Safety check (model cannot reach a write)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Model-facing tools must never write directly
        run: |
          # A reference to the write client (or its execute_* methods) from the
          # model-facing tools package would let the model write WITHOUT the
          # approval gateway. Those references belong only in gateway/ + api/.
          if grep -rEn "execute_active_response|execute_rule_tuning|execute_config_change|WazuhServerApiActionClient" services/server/wolf_server/tools/; then
            echo "ERROR: a model-facing tool references the write client — writes must go through the approval gateway!" && exit 1
          fi
          # No execute-tier tool may exist in the model-facing tools package
          # (model_tools() filters execute, but an execute-tier tool should never
          # be authored here in the first place — execution is gateway-only).
          if grep -rEn "ToolTier\.execute" services/server/wolf_server/tools/; then
            echo "ERROR: an execute-tier tool exists in wolf-server/tools — execution is gateway-only, never a model tool!" && exit 1
          fi
          echo "OK: model catalog is read+propose only; writes are gated by the approval gateway."

  # Prove at least one local model path exists (no paid dependency required)
  local-model-check:
    name: Verify local model path exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check Ollama adapter exists
        run: |
          test -f services/server/wolf_server/models/ollama.py && \
            echo "OK: Ollama adapter present." || \
            (echo "ERROR: Ollama adapter missing!" && exit 1)

  # Phase 5.6-e: prove wolf-server's mTLS posture stays correct through
  # the lifecycle (HTTPS + mTLS auto-detect + CN allowlist + /healthz
  # loopback bypass). Mint certs, start wolf-server, run the 3-curl smoke,
  # tear down. Catches regressions in the mTLS code path that the unit
  # tests can't reach because they don't go through a real TLS handshake.
  smoke-mtls:
    name: mTLS smoke (Phase 5.6-e)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: wolf
          POSTGRES_PASSWORD: wolf_test
          POSTGRES_DB: wolf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wolf -d wolf_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://wolf:wolf_test@localhost:5432/wolf_test
      SECRET_KEY: test-secret-key-exactly-32-chars!!
      ENVIRONMENT: test
      SECRETS_BACKEND: file
      SECRETS_FILE_PATH: /tmp/wolf_test_secrets.enc
      SECRETS_FILE_KEY: test-fernet-key-change-in-prod====
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Run migrations
        run: uv run --package wolf-server alembic -c services/server/alembic.ini upgrade head
      - name: Mint Wolf CA + leaves via wolf-cert init
        # --san-dns localhost is implicit, but we add it explicitly so the
        # CI runner doesn't have to expose a particular hostname.
        run: |
          uv run --package wolf-cert python -m wolf_cert init \
            --san-dns localhost \
            --san-ip 127.0.0.1
          ls -la .local/certs/
      - name: Start wolf-server in background (HTTPS + mTLS)
        run: |
          # Launcher auto-detects the certs we just minted. Output goes
          # to /tmp/wolf-server.log so we can include it in the
          # diagnostics if a step fails.
          nohup uv run --package wolf-server python -m wolf_server \
            > /tmp/wolf-server.log 2>&1 &
          # Wait for /healthz to return 200 — confirms the launcher
          # finished startup + bound the port + mTLS middleware is
          # mounted. 60 retries × 1s = 60s max wait, generous for cold
          # CI runners.
          for i in $(seq 1 60); do
            if curl -s --cacert .local/certs/ca/ca-cert.pem \
                 --max-time 2 -o /dev/null \
                 https://localhost:7860/healthz; then
              echo "wolf-server ready after ${i}s"
              break
            fi
            sleep 1
          done
          # Verify the banner reports mTLS ENABLED — if it doesn't, the
          # smoke would still "pass" because the curls run but the
          # underlying posture is wrong.
          grep -q "mTLS: ENABLED" /tmp/wolf-server.log || \
            (echo "FAIL: wolf-server didn't enable mTLS"; \
             cat /tmp/wolf-server.log; exit 1)
      - name: Run mTLS smoke
        run: make smoke-mtls
      - name: Dump wolf-server log on failure
        if: failure()
        run: |
          echo "=== /tmp/wolf-server.log ==="
          cat /tmp/wolf-server.log || true

# Phase 5.8-d: validation gate for the systemd unit files + shim
  # scripts + install.sh. No real services start; this is purely
  # syntactic + presence-of-fail-loud-branches validation. Catches
  # regressions in unit-file syntax, shim shell logic, and the
  # install.sh CLI surface.
  # Phase 5.9-e: build all five wolf-*.deb on a clean ubuntu-latest
  # runner (wolf-search joined in slice 6-f.2, ADR 0032). Catches
  # build-time issues across the per-component debian/ artifacts
  # authored in 5.9-a/b/c/d + 6-f.2 that the per-slice
  # static checks (bash -n, syntax-only validation) can't reach.
  # Runs natively on the runner (vs Docker-in-Docker) — faster, no
  # nested-container quirks.
  smoke-deb:
    name: .deb packaging smoke (Phase 5.9-e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Python 3.13
        # ubuntu-latest (noble) ships python3.12 in apt. wolf-* packages
        # have requires-python = ">=3.13"; pip wheel refuses to build
        # them against 3.12. setup-python action installs 3.13 cleanly
        # via the runner's tool cache.
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Add PostgreSQL APT repo
        # Wolf's wheel build doesn't itself need Postgres, but the
        # .deb's Depends references postgresql-18 + pgvector
        # availability. Adding the repo here makes the .debs
        # apt-installable end-to-end (and is harmless if not used).
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
              -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
              https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
              sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
      - name: Install build-deps from debian/control
        # The Build-Depends list lives in debian/control; we install
        # an explicit subset here. If you add a Build-Dep there,
        # add it here too (or use mk-build-deps from devscripts —
        # heavier but auto-extracts from control).
        run: |
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts dh-python \
            build-essential \
            python3 python3-pip python3-venv python3-build \
            nodejs npm \
            ca-certificates
      - name: Build all five .debs
        run: dpkg-buildpackage -b -us -uc
      - name: Stage .debs inside the workspace for upload
        # dpkg-buildpackage drops .deb files in the parent of the
        # source dir. GHA's upload-artifact action refuses paths
        # containing `..`, so move them into the workspace first.
        run: |
          mkdir -p packaging/build/debs
          mv ../wolf*.deb packaging/build/debs/
          ls -la packaging/build/debs/
          count=$(ls packaging/build/debs/wolf*.deb 2>/dev/null | wc -l)
          if [ "$count" -lt 5 ]; then
            echo "FAIL: expected 5 .debs, got $count"
            exit 1
          fi
          echo "OK: $count .debs produced"
      - name: Import Wolf maintainers' GPG signing key
        # docs/17 Gap 1. Pulls the private key from GitHub Actions
        # Secrets (provisioned during the operator preflight on
        # 2026-06-09). The public key is at security/wolf-maintainers.gpg
        # in the repo; operators verify the fingerprint
        # D995 2267 30A6 59B3 B86F  CDE7 3772 3B2D E0AB FD65 against
        # SECURITY.md before importing.
        #
        # push-only (2026-06-12): GitHub does not expose repository
        # secrets to Dependabot- or fork-triggered pull_request runs
        # (by design — untrusted code must never see the signing key),
        # so on PRs this step failed with "secret not set" (seen on
        # Dependabot PR #119). Signing is a release/main guarantee,
        # not a PR concern: PR runs still build + smoke all four
        # .debs; the sign + verify steps run on push, where the
        # hard FAIL-if-unset check keeps Gap 1 enforced.
        if: github.event_name == 'push'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "FAIL: GPG_PRIVATE_KEY secret not set in repo settings." >&2
            echo "  Add it at: Settings → Secrets and variables → Actions" >&2
            exit 2
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Confirm the imported key matches the published fingerprint
          gpg --list-secret-keys --keyid-format=long | grep -E "37723B2DE0ABFD65|D995 ?2267 ?30A6" \
            || { echo "FAIL: imported key fingerprint doesn't match published key"; gpg --list-secret-keys; exit 1; }
          echo "OK: Wolf signing key imported"
      - name: Sign each .deb (detached ASCII-armored signature)
        # Produces wolf-*.deb.asc alongside each .deb. Operators
        # verify with `gpg --verify wolf-server_0.1.0_amd64.deb.asc
        # wolf-server_0.1.0_amd64.deb`. The apt-repo-level Release
        # file signing (different concern) lands with Gap 2 when
        # the hosted apt repo is set up.
        # push-only: see the key-import step above.
        if: github.event_name == 'push'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PASSPHRASE" ]; then
            echo "FAIL: GPG_PASSPHRASE secret not set." >&2
            exit 2
          fi
          for deb in packaging/build/debs/wolf*.deb; do
            gpg --batch --pinentry-mode loopback \
                --passphrase "${GPG_PASSPHRASE}" \
                --armor --detach-sign \
                --default-key 0x37723B2DE0ABFD65 \
                --output "${deb}.asc" "${deb}"
            echo "  signed: ${deb}.asc"
          done
      - name: Verify .deb signatures
        # Sanity check: each .deb's signature must verify against
        # the imported key. Catches the "signed but corrupted" case
        # that would leave operators with broken signatures.
        # push-only: see the key-import step above.
        if: github.event_name == 'push'
        run: |
          for deb in packaging/build/debs/wolf*.deb; do
            gpg --verify "${deb}.asc" "${deb}" 2>&1 | tail -2
          done
          echo "OK: all signatures verified"
      - name: Upload signed .debs + signatures as workflow artifact
        # So a maintainer reviewing a PR can download the actual
        # signed .debs + their .asc signatures and `apt install
        # ./wolf-*.deb` locally to spot-check. Verify the signature
        # first via `gpg --verify wolf-*.deb.asc wolf-*.deb`.
        uses: actions/upload-artifact@v7
        with:
          name: wolf-debs
          path: |
            packaging/build/debs/wolf*.deb
            packaging/build/debs/wolf*.deb.asc
          retention-days: 14
      - name: Dump build log on failure
        if: failure()
        run: |
          echo "=== ls ../ ==="
          ls -la ../
          echo "=== debian/files (if exists) ==="
          cat debian/files 2>/dev/null || echo "(no debian/files — build didn't reach package stage)"

  # docs/17 Gap 9 — real .deb install verification.
  #
  # smoke-deb BUILDS the .debs. This job INSTALLS them on a clean
  # ubuntu-latest runner + verifies the postinst worked (users +
  # group + FHS dirs + shims + systemd units registered). Catches
  # the class of failure where the .deb builds but the postinst
  # silently broke (e.g., a venv that resolves at build time but
  # fails at install time, a missing dh_installsystemd snippet, a
  # shim with the wrong shebang).
  #
  # Doesn't start the services — that needs wolf-database init +
  # /etc/wolf-server/env provisioning, which is operator-driven.
  # Just confirms the .debs land on disk + systemd recognises them.
  smoke-deb-install:
    name: .deb install verification (Phase 5.9 / Gap 9)
    runs-on: ubuntu-latest
    needs: smoke-deb
    # This job adds three external apt repos (PostgreSQL, deadsnakes PPA,
    # NodeSource). add-apt-repository ppa:deadsnakes can hang on a slow
    # launchpad/keyserver — with no timeout it wedges at GitHub's 6-hour
    # default. Cap it so an infra hang fails fast in minutes, not hours.
    # 25 (was 15): wolf-search's postinst clones SearXNG + pip-installs
    # its deps over the network (~3-5 min on a runner) — slice 6-f.2.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Download .debs from smoke-deb
        uses: actions/download-artifact@v8
        with:
          name: wolf-debs
          path: ./debs
      - name: Add PostgreSQL APT repo (for postgresql-18 + pgvector deps)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
              -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
              https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
              sudo tee /etc/apt/sources.list.d/pgdg.list
      - name: Add deadsnakes PPA (for python3.13)
        # Ubuntu noble's stock apt has python3 = 3.12. Wolf's debian/
        # control declares `Depends: python3 (>= 3.13)` because the
        # wheels in /usr/lib/wolf-{server,database}/wheels/ carry
        # requires-python = ">=3.13". Without a 3.13 system Python,
        # the postinst's `python3 -m venv` produces a 3.12 venv +
        # `pip install` then refuses the 3.13-only wheels.
        # deadsnakes PPA backports python3.13 + 3.13-venv to noble.
        #
        # Operators on stock Ubuntu hit the same constraint — see
        # ONBOARDING / RELEASING for the recommended prereq install.
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:deadsnakes/ppa
      - name: Add NodeSource repo (for nodejs >= 20)
        # Wolf-dashboard.deb declares `Depends: nodejs (>= 20)`.
        # Ubuntu noble's stock apt nodejs is older. NodeSource is
        # the canonical operator-friendly source for Node LTS on
        # Debian/Ubuntu. Using their official setup_20.x script.
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
      - name: Refresh apt indexes after adding repos
        run: sudo apt-get update
      - name: Install python3.13 + nodejs (the runtime deps Wolf needs)
        # Install these BEFORE the wolf .debs so apt can satisfy
        # the Depends declared in debian/control:
        #   wolf-database / wolf-server : Depends: python3.13, python3.13-venv
        #   wolf-dashboard              : Depends: nodejs (>= 20)
        # Wolf's postinsts explicitly invoke `python3.13` (not the
        # default `python3`), so we don't need update-alternatives.
        run: |
          sudo apt-get install -y python3.13 python3.13-venv nodejs
          python3.13 --version
          node --version
      - name: Install all five wolf-*.debs
        # apt install resolves the inter-package deps automatically
        # (wolf-server depends on wolf-database, the meta wolf
        # depends on all three components, etc.). wolf-search's
        # Depends (uwsgi, git, libxslt-dev, ...) come from stock
        # noble; its postinst clones SearXNG at the Wolf-verified
        # pin + builds the venv — real network install, by design
        # (ADR 0032: the postinst IS the official install recipe).
        run: |
          ls -la debs/
          sudo apt install -y \
              ./debs/wolf-database_*.deb \
              ./debs/wolf-server_*.deb \
              ./debs/wolf-dashboard_*.deb \
              ./debs/wolf-search_*.deb \
              ./debs/wolf_*.deb
      - name: Verify service users + group created by postinst
        run: |
          getent group wolf || { echo "FAIL: wolf group missing"; exit 1; }
          for user in wolf-database wolf-server wolf-dashboard; do
              getent passwd "$user" || { echo "FAIL: $user not created"; exit 1; }
              # Verify nologin shell
              getent passwd "$user" | grep -E 'nologin|false' \
                  || { echo "FAIL: $user has interactive shell"; exit 1; }
          done
          echo "OK: wolf group + 3 component users (all nologin)"
      - name: Verify FHS directories exist with correct ownership
        run: |
          declare -A expected_owner=(
              [/var/lib/wolf-database/data]=wolf-database
              [/var/lib/wolf-database/config]=wolf-database
              [/var/lib/wolf-server]=wolf-server
              [/var/lib/wolf-dashboard]=wolf-dashboard
              [/etc/wolf-database]=wolf-database
              [/etc/wolf-server]=wolf-server
              [/etc/wolf-dashboard]=wolf-dashboard
          )
          for dir in "${!expected_owner[@]}"; do
              test -d "$dir" || { echo "FAIL: $dir missing"; exit 1; }
              owner=$(stat -c %U "$dir")
              if [ "$owner" != "${expected_owner[$dir]}" ]; then
                  echo "FAIL: $dir owned by $owner, expected ${expected_owner[$dir]}"
                  exit 1
              fi
          done
          echo "OK: all 7 FHS dirs present with correct ownership"
      - name: Verify Python venvs built by postinst
        # wolf-database + wolf-server postinsts create venvs at
        # /usr/lib/wolf-*/.venv/ from the bundled wheels. wolf-
        # dashboard ships a Next.js standalone build, not a venv.
        run: |
          for venv in /usr/lib/wolf-database/.venv /usr/lib/wolf-server/.venv; do
              test -d "$venv" || { echo "FAIL: $venv missing"; exit 1; }
              test -x "$venv/bin/python" || { echo "FAIL: $venv/bin/python not executable"; exit 1; }
          done
          test -f /usr/lib/wolf-dashboard/server.js \
              || { echo "FAIL: wolf-dashboard standalone server.js missing"; exit 1; }
          # Phase 6.5-h.2: the shim runs the edge proxy (not server.js
          # directly); it must ship alongside the standalone build.
          test -f /usr/lib/wolf-dashboard/edge-proxy.mjs \
              || { echo "FAIL: wolf-dashboard edge-proxy.mjs missing"; exit 1; }
          echo "OK: wolf-database + wolf-server venvs + wolf-dashboard standalone all present"
      - name: Verify CLI shims work
        run: |
          for shim in /usr/bin/wolf-cert /usr/bin/wolf-database /usr/bin/wolf-server /usr/bin/wolf-dashboard /usr/bin/bootstrap_superuser; do
              test -x "$shim" || { echo "FAIL: $shim not executable"; exit 1; }
          done
          # wolf-database --help should print actual help text (proves
          # the venv works end-to-end + the console_scripts entry
          # point resolved correctly).
          /usr/bin/wolf-database --help 2>&1 | head -5
          /usr/bin/wolf-cert --help 2>&1 | head -5
          echo "OK: shims executable + CLIs respond"
      - name: Verify systemd units are loaded
        # Don't start the three core components (needs operator-driven
        # init); just confirm systemd recognises the units so they
        # could be started. wolf-search gets a REAL start below — it
        # is the one component whose postinst leaves it fully runnable.
        run: |
          for unit in wolf-database wolf-server wolf-dashboard wolf-search; do
              systemctl status "$unit" --no-pager 2>&1 | head -3 || true
              # `is-enabled` returns "disabled" for fresh installs
              # (postinst doesn't auto-enable; operator does that
              # after env-file provisioning). The KEY signal is
              # exit code 0 from `cat` — file is on disk + parseable.
              systemctl cat "$unit" >/dev/null 2>&1 \
                  || { echo "FAIL: systemctl can't load $unit unit"; exit 1; }
          done
          echo "OK: all 4 systemd units loaded + parseable"
      - name: Verify wolf-search postinst effects (slice 6-f.2)
        # The postinst = the official SearXNG recipe pinned to the
        # Wolf-verified commit. Verify each of its jobs actually
        # happened on this clean runner.
        run: |
          getent passwd searxng || { echo "FAIL: searxng user missing"; exit 1; }
          pin="747cec4c2304fc2e06ceb4a46dbe25bfb769db1e"
          head=$(sudo -u searxng git -C /usr/local/searxng/searxng-src rev-parse HEAD)
          [ "$head" = "$pin" ] \
              || { echo "FAIL: searxng-src at $head, expected pin $pin"; exit 1; }
          test -x /usr/local/searxng/searx-pyenv/bin/python \
              || { echo "FAIL: searx-pyenv venv missing"; exit 1; }
          perms=$(stat -c "%a %U %G" /etc/searxng/settings.yml)
          [ "$perms" = "640 root searxng" ] \
              || { echo "FAIL: settings.yml is '$perms', expected '640 root searxng'"; exit 1; }
          if sudo grep -q "ultrasecretkey" /etc/searxng/settings.yml; then
              echo "FAIL: secret_key placeholder not substituted"; exit 1
          fi
          test -f /etc/uwsgi/apps-available/searxng.ini \
              || { echo "FAIL: uwsgi ini missing"; exit 1; }
          if test -L /etc/uwsgi/apps-enabled/searxng.ini; then
              echo "FAIL: ini must NOT be in apps-enabled (double-run)"; exit 1
          fi
          test -x /usr/bin/wolf-search || { echo "FAIL: wolf-search shim missing"; exit 1; }
          /usr/bin/wolf-search help | grep -q "health" \
              || { echo "FAIL: wolf-search help doesn't list health"; exit 1; }
          echo "OK: searxng user + pinned checkout + venv + settings(640) + ini + shim"
      - name: Start wolf-search + end-to-end health check
        # Unlike the three core components, wolf-search needs no
        # operator-provisioned env — postinst leaves it runnable.
        # `wolf-search health` probes the exact JSON endpoint
        # wolf-server's SearxngProvider consumes; SearXNG answers
        # HTTP 200 regardless of upstream-engine luck, so this is
        # stable on a datacenter runner.
        run: |
          sudo systemctl start wolf-search
          for i in $(seq 1 12); do
              if /usr/bin/wolf-search health; then
                  echo "OK: wolf-search healthy end-to-end (loopback 1307, JSON API 200)"
                  exit 0
              fi
              sleep 5
          done
          echo "FAIL: wolf-search not healthy after 60s"
          sudo journalctl -u wolf-search --no-pager | tail -40
          exit 1
      - name: Smoke summary
        run: |
          echo "=== smoke-deb-install: PASS ==="
          echo "wolf-* packages installed cleanly on ubuntu-latest"
          echo "users / group / FHS dirs / venvs / shims / systemd units all verified"
          echo "wolf-search: postinst recipe verified + service started + health OK"

  smoke-systemd:
    name: systemd + shims smoke (Phase 5.8-d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install dependencies (for the workspace + npm path)
        # `make install-user-systemd` needs `npm` on PATH to
        # substitute @NODE_BIN@. GHA ubuntu-latest preinstalls
        # node + npm; this step's `command -v npm` smoke confirms.
        run: |
          uv sync --all-packages
          command -v npm
      - name: Run smoke-systemd
        run: make smoke-systemd

  # Phase 5.7-d: end-to-end smoke for wolf-database (the bundled
  # Postgres component). Installs postgresql-18 + postgresql-18-pgvector
  # via apt, then runs `make smoke-database` which exercises the full
  # CLI lifecycle: status (empty) → init → start → status (running) →
  # stop → status (stopped). Catches regressions in the CLI's
  # interaction with real Postgres binaries that the unit tests with
  # mocked subprocess can't reach.
  smoke-database:
    name: wolf-database smoke (Phase 5.7-d)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Add PostgreSQL APT repo + install postgresql-18 + pgvector
        # Ubuntu 24.04's default repos ship Postgres 16; we need 18
        # to match the version wolf-database enforces.
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
              -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
              https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | \
              sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt update
          sudo apt install -y postgresql-18 postgresql-18-pgvector
          # Stop the system Postgres unit Debian/Ubuntu auto-starts
          # post-install; we don't want it fighting wolf-database for
          # port 5432 (though the smoke uses 17860 anyway).
          sudo systemctl stop postgresql || true
      - name: Install Python deps
        run: uv sync --all-packages
      - name: Run wolf-database lifecycle smoke
        run: make smoke-database
